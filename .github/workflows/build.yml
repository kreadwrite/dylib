name: Build PXTok

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          brew install ldid

      - name: Install iOS SDK
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git "$HOME/sdks-tmp"
          mkdir -p "$HOME/theos/sdks"
          cp -r "$HOME/sdks-tmp/iPhoneOS16.5.sdk" "$HOME/theos/sdks/"

      - name: Build package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: PXTok-deb
          path: packages/*.deb
