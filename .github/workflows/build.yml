name: Build PXTok

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          brew install ldid

      - name: Install iOS SDK
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git "$HOME/sdks-tmp"
          mkdir -p "$HOME/theos/sdks"
          cp -r "$HOME/sdks-tmp/iPhoneOS16.5.sdk" "$HOME/theos/sdks/"

      - name: Build CydiaSubstrate shim
        run: |
          # Compile a self-contained CydiaSubstrate.dylib shim for Sideloadly users
          # This provides MSHookMessageEx and MSHookFunction without needing real CydiaSubstrate
          SDK="$HOME/theos/sdks/iPhoneOS16.5.sdk"
          
          # Compile for arm64
          clang -arch arm64 \
            -isysroot "$SDK" \
            -target arm64-apple-ios14.0 \
            -fobjc-arc \
            -Wno-deprecated-declarations \
            -dynamiclib \
            -o /tmp/CydiaSubstrate_arm64.dylib \
            scripts/SubstrateShim.m \
            -framework Foundation \
            -framework UIKit \
            -lobjc \
            -install_name /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate
          
          # Compile for arm64e
          clang -arch arm64e \
            -isysroot "$SDK" \
            -target arm64e-apple-ios14.0 \
            -fobjc-arc \
            -Wno-deprecated-declarations \
            -dynamiclib \
            -o /tmp/CydiaSubstrate_arm64e.dylib \
            scripts/SubstrateShim.m \
            -framework Foundation \
            -framework UIKit \
            -lobjc \
            -install_name /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate
          
          # Create universal binary
          lipo -create /tmp/CydiaSubstrate_arm64.dylib /tmp/CydiaSubstrate_arm64e.dylib \
            -output CydiaSubstrate.dylib
          
          # Sign with ldid
          ldid -S CydiaSubstrate.dylib
          
          echo "CydiaSubstrate shim built:"
          ls -la CydiaSubstrate.dylib
          file CydiaSubstrate.dylib

      - name: Build PXTok package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: PXTok-deb
          path: packages/*.deb

      - name: Upload CydiaSubstrate shim
        uses: actions/upload-artifact@v4
        with:
          name: CydiaSubstrate-shim
          path: CydiaSubstrate.dylib
